<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cooperativa Olivicola{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f0; color: #333; line-height: 1.5; }

        nav {
            background: #2c5f2e;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-weight: bold;
            font-size: 1rem;
            color: white;
            text-decoration: none;
            margin-right: 1.5rem;
            white-space: nowrap;
        }
        .nav-link {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.88rem;
            padding: 0.4rem 0.9rem;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
        }
        .nav-link:hover { background: rgba(255,255,255,0.15); color: white; }
        .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
        .nav-spacer { flex: 1; }

        main { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

        .page-header { margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.6rem; margin-bottom: 0.2rem; }
        .page-header p { color: #666; font-size: 0.9rem; }
        .page-header-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .page-header-row h1 { font-size: 1.6rem; }
        .page-header-row p { color: #666; font-size: 0.9rem; }

        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .card-body { padding: 1.5rem; }
        .card-accent { border-left: 4px solid #2c5f2e; }

        .section-title {
            font-size: 0.92rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #f0f0f0;
        }

        table { width: 100%; border-collapse: collapse; }
        thead { background: #f7f7f7; }
        th {
            padding: 0.7rem 1rem;
            text-align: left;
            font-size: 0.78rem;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            border-bottom: 1px solid #e5e5e5;
        }
        td { padding: 0.8rem 1rem; font-size: 0.9rem; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f8fdf8; }
        td.mono { font-family: monospace; font-size: 0.82rem; color: #555; }
        td.empty { color: #aaa; text-align: center; padding: 2.5rem; }

        .table-inline thead { background: transparent; }
        .table-inline th { font-size: 0.78rem; padding: 0.5rem 0.75rem; }
        .table-inline td { font-size: 0.88rem; padding: 0.55rem 0.75rem; }

        .info-list { display: flex; flex-direction: column; gap: 0.65rem; }
        .info-row { display: flex; flex-direction: column; gap: 0.1rem; }
        .info-label { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.05em; color: #999; }
        .info-value { font-size: 0.92rem; color: #222; }
        .info-value.mono { font-family: monospace; font-size: 0.82rem; }

        .metric-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; text-align: center; }
        .metric-item .metric-value { font-size: 1.4rem; font-weight: bold; }
        .metric-item .metric-value.highlight { color: #2c5f2e; }
        .metric-item .metric-label { font-size: 0.8rem; color: #888; margin-top: 0.15rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { padding: 1.5rem; }
        .stat-value { font-size: 2.2rem; font-weight: bold; color: #2c5f2e; }
        .stat-label { color: #555; font-size: 0.95rem; margin-top: 0.2rem; }
        .stat-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.65rem; }

        .link-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .link-card { padding: 1.5rem; text-decoration: none; display: block; transition: box-shadow 0.15s, transform 0.1s; }
        .link-card:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.13); transform: translateY(-1px); }
        .link-card-title { font-weight: bold; color: #222; font-size: 1rem; }
        .link-card-desc { color: #888; font-size: 0.88rem; margin-top: 0.3rem; }
        .link-card-action { color: #2c5f2e; font-size: 0.85rem; margin-top: 0.9rem; }

        .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; align-items: start; }
        .detail-stack { display: flex; flex-direction: column; gap: 1rem; }

        .badge {
            display: inline-block;
            padding: 0.18rem 0.6rem;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .badge-ingresado  { background: #e3f2fd; color: #1565c0; }
        .badge-analisis   { background: #fff3e0; color: #e65100; }
        .badge-analizado  { background: #f3e5f5; color: #6a1b9a; }
        .badge-asignado   { background: #e8f5e9; color: #2e7d32; }
        .badge-armado     { background: #fffde7; color: #f57f17; }
        .badge-finalizado { background: #e8f5e9; color: #1b5e20; }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            font-size: 0.88rem;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover { color: #2c5f2e; }

        .analysis-item { padding: 0.7rem 0; border-bottom: 1px solid #f0f0f0; }
        .analysis-item:last-child { border-bottom: none; }
        .analysis-item .analysis-tipo { font-weight: 600; font-size: 0.9rem; }
        .analysis-item .analysis-fecha { color: #999; font-size: 0.8rem; margin-top: 0.15rem; }

        .subtotal { text-align: right; font-size: 0.88rem; color: #555; margin-top: 0.75rem; padding-top: 0.5rem; border-top: 1px solid #f0f0f0; }
        .subtotal strong { color: #222; }

        .empty-state { color: #bbb; font-size: 0.88rem; text-align: center; padding: 1.5rem 0; }

        a { color: #2c5f2e; }

        .chat-layout { display: flex; flex-direction: column; height: calc(100vh - 56px - 4rem); }
        .chat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .chat-header h1 { font-size: 1.6rem; }
        .btn-secondary {
            font-size: 0.82rem; padding: 0.4rem 0.9rem; border-radius: 4px;
            border: 1px solid #ccc; background: white; color: #555;
            text-decoration: none; cursor: pointer;
        }
        .btn-secondary:hover { background: #f5f5f5; color: #333; }

        .chat-messages {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            gap: 0.75rem; padding: 1rem; background: white;
            border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 1rem; min-height: 0;
        }
        .chat-msg { display: flex; flex-direction: column; max-width: 78%; }
        .chat-msg.user { align-self: flex-end; align-items: flex-end; }
        .chat-msg.agent { align-self: flex-start; align-items: flex-start; }
        .chat-bubble {
            padding: 0.65rem 1rem; border-radius: 12px;
            font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word;
        }
        .chat-msg.user .chat-bubble { background: #2c5f2e; color: white; border-bottom-right-radius: 3px; }
        .chat-msg.agent .chat-bubble { background: #f0f2f0; color: #222; border-bottom-left-radius: 3px; }
        .chat-tools { font-size: 0.72rem; color: #aaa; margin-top: 0.2rem; padding: 0 0.25rem; }
        .chat-empty { color: #bbb; font-size: 0.9rem; text-align: center; margin: auto; }
        .chat-thinking .chat-bubble { color: #aaa; font-style: italic; }

        .chat-form {
            display: flex; gap: 0.5rem;
        }
        .chat-form input {
            flex: 1; padding: 0.65rem 1rem; border: 1px solid #ddd;
            border-radius: 6px; font-size: 0.9rem; outline: none;
        }
        .chat-form input:focus { border-color: #2c5f2e; }
        .chat-form button {
            padding: 0.65rem 1.4rem; background: #2c5f2e; color: white;
            border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer;
        }
        .chat-form button:hover { background: #245026; }
        .chat-form button:disabled { background: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>
    <nav>
        <a class="nav-brand" href="{% url 'dashboard' %}">Cooperativa Olivicola</a>
        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
        <a class="nav-link {% if 'lote' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'lista_lotes' %}">Materia Prima</a>
        <a class="nav-link {% if 'produccion' in request.resolver_match.url_name %}active{% endif %}" href="{% url 'lista_produccion' %}">Produccion</a>
        <a class="nav-link {% if request.resolver_match.url_name == 'chat' %}active{% endif %}" href="{% url 'chat' %}">Agente</a>
        <span class="nav-spacer"></span>
        <a class="nav-link" href="/admin/">Admin</a>
        <a class="nav-link" href="/api/swagger/">API Docs</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
