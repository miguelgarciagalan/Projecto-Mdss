version: '3.8'

services:
  db:
    image: postgres:15
    container_name: db_cooperativa
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env_local
    networks:
      - cooperativa_network

  web:
    build: .
    container_name: web_cooperativa
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env_local
    depends_on:
      - db
    networks:
      - cooperativa_network

networks:
  cooperativa_network:
    driver: bridge

volumes:
  postgres_data: